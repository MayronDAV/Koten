name: linux

on: [push, pull_request]

jobs:
  Build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        config: [debug, release, dist]
        platform: [x64]
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
        submodules: recursive

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential \
          libgl1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev \
          libxcursor-dev libxi-dev libxxf86vm-dev mesa-common-dev \
          libgtk-3-dev mono-complete g++-13 gcc-13

    - name: Build ${{ matrix.platform }} ${{ matrix.config }}
      run: |
        chmod u+r+x Tools/Linux/premake5
        Tools/Linux/premake5 gmake2 --dotnet=mono
        make config=${{ matrix.config }} CC=gcc-13 CXX=g++-13 -j8

    - name: Upload Bin Artifacts
      uses: ./.github/actions/upload-artifact
      with:
        name: Koten-Linux-${{ matrix.config }}-${{ matrix.platform }}
        path: bin
